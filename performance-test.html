<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Test - Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .performance-metrics {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
        }
        .metric {
            margin: 2px 0;
        }
        .metric.good { color: #4CAF50; }
        .metric.warning { color: #FF9800; }
        .metric.error { color: #F44336; }
    </style>
</head>
<body>
    <div class="performance-metrics" id="performance-metrics">
        <div class="metric" id="load-time">Load Time: Measuring...</div>
        <div class="metric" id="dom-ready">DOM Ready: Measuring...</div>
        <div class="metric" id="components-init">Components: Measuring...</div>
        <div class="metric" id="interaction-time">Last Interaction: -</div>
    </div>

    <div class="dashboard">
        <!-- Greeting Component Container -->
        <section class="greeting-section">
            <div id="greeting-container" class="greeting-container">
                <div id="time-display" class="time-display"></div>
                <div id="date-display" class="date-display"></div>
                <div id="greeting-display" class="greeting-display"></div>
                <div class="name-input-section">
                    <input type="text" id="name-input" placeholder="Enter your name" class="name-input">
                    <button id="save-name-btn" class="save-name-btn">Save</button>
                </div>
            </div>
        </section>

        <!-- Focus Timer Component Container -->
        <section class="timer-section">
            <div id="timer-container" class="timer-container">
                <h2>Focus Timer</h2>
                <div id="timer-display" class="timer-display">25:00</div>
                <div class="timer-controls">
                    <button id="start-timer-btn" class="timer-btn start-btn">Start</button>
                    <button id="stop-timer-btn" class="timer-btn stop-btn">Stop</button>
                    <button id="reset-timer-btn" class="timer-btn reset-btn">Reset</button>
                </div>
            </div>
        </section>

        <!-- Task Manager Component Container -->
        <section class="tasks-section">
            <div id="tasks-container" class="tasks-container">
                <h2>Tasks</h2>
                <div class="task-input-section">
                    <input type="text" id="task-input" placeholder="Add a new task" class="task-input">
                    <button id="add-task-btn" class="add-task-btn">Add Task</button>
                </div>
                <div id="task-list" class="task-list"></div>
            </div>
        </section>

        <!-- Quick Links Component Container -->
        <section class="links-section">
            <div id="links-container" class="links-container">
                <h2>Quick Links</h2>
                <div class="link-input-section">
                    <input type="text" id="link-url-input" placeholder="Enter URL" class="link-input">
                    <input type="text" id="link-label-input" placeholder="Enter label" class="link-input">
                    <button id="add-link-btn" class="add-link-btn">Add Link</button>
                </div>
                <div id="link-list" class="link-list"></div>
            </div>
        </section>
    </div>

    <script>
        // Performance monitoring
        const startTime = performance.now();
        let domReadyTime, componentsInitTime;

        // Update performance metrics display
        function updateMetric(id, value, threshold = null) {
            const element = document.getElementById(id);
            if (element) {
                element.textContent = value;
                if (threshold) {
                    const numValue = parseFloat(value.match(/[\d.]+/)?.[0] || 0);
                    if (numValue < threshold.good) {
                        element.className = 'metric good';
                    } else if (numValue < threshold.warning) {
                        element.className = 'metric warning';
                    } else {
                        element.className = 'metric error';
                    }
                }
            }
        }

        // Monitor DOM ready
        document.addEventListener('DOMContentLoaded', () => {
            domReadyTime = performance.now();
            updateMetric('dom-ready', `DOM Ready: ${(domReadyTime - startTime).toFixed(2)}ms`, {
                good: 100,
                warning: 500
            });
        });

        // Monitor interaction response times
        function monitorInteractions() {
            const interactiveElements = document.querySelectorAll('button, input');
            interactiveElements.forEach(element => {
                element.addEventListener('click', () => {
                    const interactionStart = performance.now();
                    requestAnimationFrame(() => {
                        const interactionEnd = performance.now();
                        const responseTime = interactionEnd - interactionStart;
                        updateMetric('interaction-time', `Last Interaction: ${responseTime.toFixed(2)}ms`, {
                            good: 16,
                            warning: 100
                        });
                    });
                });
            });
        }

        // Wait for components to initialize
        setTimeout(() => {
            componentsInitTime = performance.now();
            const totalLoadTime = componentsInitTime - startTime;
            
            updateMetric('load-time', `Load Time: ${totalLoadTime.toFixed(2)}ms`, {
                good: 500,
                warning: 1000
            });
            
            updateMetric('components-init', `Components: ${(componentsInitTime - domReadyTime).toFixed(2)}ms`, {
                good: 100,
                warning: 500
            });

            // Start monitoring interactions
            monitorInteractions();

            // Log performance to console
            console.log('Performance Metrics:');
            console.log(`Total Load Time: ${totalLoadTime.toFixed(2)}ms`);
            console.log(`DOM Ready: ${(domReadyTime - startTime).toFixed(2)}ms`);
            console.log(`Components Init: ${(componentsInitTime - domReadyTime).toFixed(2)}ms`);
            
            // Check requirements
            if (totalLoadTime < 1000) {
                console.log('✅ Load time requirement met (< 1000ms)');
            } else {
                console.log('❌ Load time requirement failed (>= 1000ms)');
            }
        }, 200);
    </script>
    <script src="js/app.js"></script>
</body>
</html>
